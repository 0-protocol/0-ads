<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0-ads Advertiser Dashboard</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f172a; color: #f8fafc; padding: 2rem; }
        .card { background: #1e293b; padding: 2rem; border-radius: 8px; margin-bottom: 1.5rem; }
        h1 { color: #38bdf8; }
        input, button { padding: 0.5rem; margin: 0.5rem 0; border-radius: 4px; border: 1px solid #475569; background: #334155; color: white; }
        button { background: #0ea5e9; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #0284c7; }
        pre { background: #020617; padding: 1rem; border-radius: 4px; overflow-x: auto; }
        .campaign-list { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .campaign-item { background: #0f172a; padding: 1rem; border-radius: 6px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <h1>0-ads Advertiser Dashboard</h1>
    
    <div class="card">
        <h2>Launch New Ad Intent</h2>
        <input type="text" id="campaignId" placeholder="Campaign ID (e.g. 0-ads-002)" style="width: 100%"><br>
        <input type="text" id="advertiser" placeholder="Advertiser Name" style="width: 100%"><br>
        <input type="number" id="budget" placeholder="Total Budget (USDC)" style="width: 100%"><br>
        <input type="number" id="payout" placeholder="Payout per Agent (USDC)" style="width: 100%"><br>
        <input type="text" id="graphHash" placeholder="0-lang Verification Graph Hash" style="width: 100%"><br>
        <button onclick="broadcastIntent()">Broadcast to P2P Network</button>
        <div id="broadcastStatus" style="color: #4ade80; margin-top: 1rem;"></div>
    </div>

    <div class="card">
        <h2>Active Campaigns (Network State)</h2>
        <button onclick="fetchIntents()">Refresh Network State</button>
        <div class="campaign-list" id="intentsList" style="margin-top: 1rem;"></div>
    </div>

    <script>
        const API_URL = "https://ads.0-protocol.org";

        async function broadcastIntent() {
            const data = {
                campaign_id: document.getElementById('campaignId').value,
                advertiser: document.getElementById('advertiser').value,
                budget: parseInt(document.getElementById('budget').value),
                payout_per_execution: parseInt(document.getElementById('payout').value),
                verification_graph_hash: document.getElementById('graphHash').value
            };
            
            try {
                const res = await fetch(`${API_URL}/api/v1/intents/broadcast`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                document.getElementById('broadcastStatus').innerText = "Intent successfully broadcasted to agents!";
                fetchIntents();
            } catch (e) {
                document.getElementById('broadcastStatus').innerText = "Error: " + e;
                document.getElementById('broadcastStatus').style.color = "#f87171";
            }
        }

        async function fetchIntents() {
            try {
                const res = await fetch(`${API_URL}/api/v1/intents`);
                const intents = await res.json();
                
                const html = intents.map(i => `
                    <div class="campaign-item">
                        <h3 style="margin-top:0; color:#38bdf8;">${i.campaign_id}</h3>
                        <p><strong>Advertiser:</strong> ${i.advertiser}</p>
                        <p><strong>Budget:</strong> ${i.budget} USDC</p>
                        <p><strong>Payout:</strong> ${i.payout_per_execution} USDC</p>
                        <p><strong>Hash:</strong> <code>${i.verification_graph_hash.substring(0,10)}...</code></p>
                    </div>
                `).join('');
                document.getElementById('intentsList').innerHTML = html || "<p>No active intents found.</p>";
            } catch (e) {
                document.getElementById('intentsList').innerHTML = `<p style="color:#f87171">Failed to fetch intents: ${e}</p>`;
            }
        }

        // Initial fetch
        fetchIntents();
    </script>
</body>
</html>
